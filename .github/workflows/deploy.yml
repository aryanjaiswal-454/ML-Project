name: Build and Deploy Container

on:
  push:
    branches:
      - main  # Change to your default branch name if different

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v2
      with:
        login-server: ${{ secrets.REGISTRY_URL }} # e.g., yourregistry.azurecr.io
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.REGISTRY_URL }}/student-performance-prediction:latest .
        docker push ${{ secrets.REGISTRY_URL }}/student-performance-prediction:latest

    - name: Log in to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'student-performance-prediction'
        images: '${{ secrets.REGISTRY_URL }}/student-performance-prediction:latest'
